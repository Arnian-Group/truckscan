server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Docker embedded DNS — re-resolves "backend" after container restarts
    resolver 127.0.0.11 valid=15s ipv6=off;

    # Pure API / utility routes — always proxy, never SPA
    location ~ ^/(auth|uploads|health)(/.*)?$ {
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Routes shared between SPA pages and API endpoints.
    # Browser page load/refresh sends "text/html" in Accept → serve SPA.
    # Axios API calls send "application/json" → proxy to backend.
    location ~ ^/(trailers|users|audit|vehicles)(/.*)?$ {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}
