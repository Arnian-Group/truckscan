version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: truckscan
      POSTGRES_USER: truckscan
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truckscan"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://truckscan:${DB_PASSWORD}@db:5432/truckscan
      SECRET_KEY: ${SECRET_KEY}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.truckscan-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/auth`) || PathPrefix(`/trailers`) || PathPrefix(`/users`) || PathPrefix(`/audit`) || PathPrefix(`/uploads`) || PathPrefix(`/health`))"
      - "traefik.http.routers.truckscan-api.entrypoints=websecure"
      - "traefik.http.routers.truckscan-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.truckscan-api.priority=10"
      - "traefik.http.services.truckscan-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.truckscan-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.truckscan-app.entrypoints=websecure"
      - "traefik.http.routers.truckscan-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.truckscan-app.priority=1"
      - "traefik.http.services.truckscan-app.loadbalancer.server.port=80"

volumes:
  postgres_data:
  uploads_data:

networks:
  default:
  dokploy-network:
    external: true
